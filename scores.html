<style>
:root{--green:#1a3a2a;--green2:#2d5a3f;--green3:#3d7a54;--gold:#c8a84b;--gold2:#e8c96a;--cream:#f5f0e8;--white:#fff;--gray:#6b7280;--light:#eef2ed;--radius:8px;--shadow:0 2px 12px rgba(0,0,0,.1);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--green);min-height:100vh;}
header{background:var(--green);color:#fff;padding:36px 20px 28px;text-align:center;position:relative;overflow:hidden;}
header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(200,168,75,.18) 0%,transparent 70%);pointer-events:none;}
.badge{display:inline-block;border:1px solid rgba(200,168,75,.4);color:var(--gold2);font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;padding:3px 12px;border-radius:2px;margin-bottom:12px;}
header h1{font-family:'Playfair Display',serif;font-size:clamp(1.7rem,5vw,2.8rem);font-weight:900;line-height:1.1;margin-bottom:5px;}
header h1 span{color:var(--gold2);}
.header-sub{color:rgba(255,255,255,.5);font-size:.83rem;}
nav{background:var(--green2);position:sticky;top:0;z-index:100;border-bottom:2px solid var(--gold);box-shadow:0 2px 8px rgba(0,0,0,.2);}
nav ul{display:flex;list-style:none;max-width:960px;margin:0 auto;overflow-x:auto;}
nav ul::-webkit-scrollbar{display:none;}
nav a{display:block;color:rgba(255,255,255,.75);text-decoration:none;font-size:.8rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:13px 16px;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;}
nav a:hover,nav a.active{color:var(--gold2);border-bottom-color:var(--gold2);}
main{max-width:720px;margin:0 auto;padding:24px 16px 60px;}
.week-picker{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 16px;margin-bottom:20px;}
.picker-label{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--green3);margin-bottom:10px;}
.week-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;}
.wk{padding:6px 2px;border:2px solid rgba(45,90,63,.18);border-radius:5px;font-family:'DM Mono',monospace;font-size:.75rem;font-weight:600;color:var(--green);background:var(--white);cursor:pointer;text-align:center;transition:all .15s;}
.wk:hover{border-color:var(--green3);background:var(--light);}
.wk.fun{border-color:var(--gold);color:var(--gold);}
.wk.active{background:var(--green);color:#fff;border-color:var(--green);}
.wk.fun.active{background:var(--gold);color:var(--green);border-color:var(--gold);}
@media(max-width:500px){.week-grid{grid-template-columns:repeat(5,1fr);}}
.status-bar{display:flex;align-items:center;gap:8px;margin-bottom:20px;font-family:'DM Mono',monospace;font-size:.72rem;color:var(--green2);}
.dot{width:7px;height:7px;background:#22c55e;border-radius:50%;animation:pulse 2s ease-in-out infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.75);}}
.loading{text-align:center;padding:48px 20px;}
.spinner{width:28px;height:28px;border:3px solid rgba(45,90,63,.15);border-top-color:var(--green3);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading p{color:var(--gray);font-size:.9rem;}
.section-label{display:flex;align-items:center;gap:10px;margin:20px 0 12px;}
.section-label span{font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;font-weight:600;white-space:nowrap;}
.section-label.front span{color:#2e7d32;}
.section-label.back span{color:#1565c0;}
.section-label::before,.section-label::after{content:'';flex:1;height:1px;background:rgba(45,90,63,.15);}
.match{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;}
.match-top{background:var(--green);padding:10px 14px;}
.match-meta{font-family:'DM Mono',monospace;font-size:.65rem;color:rgba(255,255,255,.5);letter-spacing:.06em;margin-bottom:3px;}
.match-title{font-weight:700;font-size:.92rem;color:#fff;}
.match-result{display:inline-block;margin-top:5px;font-family:'DM Mono',monospace;font-size:.68rem;padding:2px 8px;border-radius:3px;background:rgba(200,168,75,.2);color:var(--gold2);}
.team{padding:12px 14px;}
.team+.team{border-top:1px solid rgba(45,90,63,.08);}
.team-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.team-name-label{font-weight:700;font-size:.9rem;}
.team-name-label.winner{color:var(--green3);}
.team-pts{font-family:'DM Mono',monospace;font-size:.8rem;font-weight:600;}
.score-header{display:grid;grid-template-columns:1fr auto auto auto;gap:0 12px;padding:0 0 4px;border-bottom:1px solid rgba(45,90,63,.1);margin-bottom:2px;}
.score-header span{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--gray);text-align:right;}
.score-header span:first-child{text-align:left;}
.player-row{display:grid;grid-template-columns:1fr auto auto auto;gap:0 12px;align-items:center;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.04);}
.player-row:last-child{border-bottom:none;}
.player-name-cell{font-size:.85rem;font-weight:600;}
.sub-badge{font-size:.62rem;font-family:'DM Mono',monospace;color:var(--gold);margin-left:5px;background:rgba(200,168,75,.12);padding:1px 5px;border-radius:3px;}
.score-col{font-family:'DM Mono',monospace;font-size:.82rem;text-align:right;}
.score-col.net{color:var(--green3);}
.score-col.empty{color:#ccc;}
footer{background:var(--green);color:rgba(255,255,255,.4);text-align:center;font-size:.76rem;padding:18px;font-family:'DM Mono',monospace;letter-spacing:.04em;}
</style>
</head>

let activeWeek = null;

// Build week buttons
const grid = document.getElementById('weekGrid');
SCHEDULE.forEach(({week, fun}) => {
  const btn = document.createElement('button');
  btn.className = 'wk' + (fun ? ' fun' : '');
  btn.textContent = `W${week}`;
  btn.id = `wbtn-${week}`;
  btn.onclick = () => selectWeek(week);
  grid.appendChild(btn);
});

// Get cell value safely
function g(row, ci) {
  if (!row || !row.c) return null;
  const cell = row.c[ci];
  if (cell === null || cell === undefined) return null;
  if (cell.v !== undefined && cell.v !== null) return cell.v;
  return null;
}

function isSub(v) {
  return v != null && !String(v).includes('←') && String(v).trim().length > 0;
}

async function selectWeek(w) {
  if (activeWeek === w) return;
  activeWeek = w;

  document.querySelectorAll('.wk').forEach(b => b.classList.remove('active'));
  document.getElementById(`wbtn-${w}`).classList.add('active');

  const weekData = SCHEDULE[w - 1];
  document.getElementById('statusText').textContent = `Loading Week ${w} — ${weekData.date}…`;
  document.getElementById('matchContent').innerHTML = `<div class="loading"><div class="spinner"></div><p>Loading Week ${w} scores…</p></div>`;

  try {
    // headers=0 means ALL rows returned as data — no row treated as column header
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=0&sheet=Week_${w}&cb=${Date.now()}`;
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.replace(/^[^(]+\(/, '').replace(/\);?\s*$/, ''));
    const rows = (json.table || {}).rows || [];

    // Find all TOTALS rows in order — these contain the actual scores
    // Also find all Match header rows in order for winner and handicap data
    const matchHeaders = []; // {ri, winnerRaw, hdcpA1, hdcpA2, hdcpB1, hdcpB2, subA1, subA2, subB1, subB2}
    const totalsRows = [];   // in order of appearance

    for (let ri = 0; ri < rows.length; ri++) {
      const colA = String(g(rows[ri], 0) || '').trim();

      if (colA.startsWith('Match ') && colA.includes('|')) {
        // Match header found — get winner from col L (11) and handicaps from next 2 rows
        const rowA = rows[ri + 1] || null;
        const rowB = rows[ri + 2] || null;
        matchHeaders.push({
          ri,
          winnerRaw: String(g(rows[ri], 11) || ''),
          hdcpA1: g(rowA, 6),   // Team A P1 80% net hdcp
          hdcpA2: g(rowA, 10),  // Team A P2 80% net hdcp
          hdcpB1: g(rowB, 6),   // Team B P1 80% net hdcp
          hdcpB2: g(rowB, 10),  // Team B P2 80% net hdcp
          subA1:  g(rowA, 17),  // Sub override Team A P1
          subA2:  g(rowA, 19),  // Sub override Team A P2
          subB1:  g(rowB, 17),  // Sub override Team B P1
          subB2:  g(rowB, 19),  // Sub override Team B P2
        });
      }

      if (colA === 'TOTALS') {
        totalsRows.push(rows[ri]);
      }
    }

    // Build match results by pairing schedule matches with GViz data
    const matches = weekData.matches.map((sm, i) => {
      const hdr = matchHeaders[i] || {};
      const tot = totalsRows[i] || null;

      // Team and player names — 100% from hardcoded data
      const teamAName = sm.a;
      const teamBName = sm.b;
      const [p1n, p2n] = getPlayers(teamAName);
      const [p3n, p4n] = getPlayers(teamBName);

      // Winner
      const wr = hdr.winnerRaw || '';
      let winner = '';
      if (wr.includes('TEAM A')) winner = 'a';
      else if (wr.includes('TEAM B')) winner = 'b';
      else if (wr.toUpperCase().includes('TIE')) winner = 'tie';

      // Scores from TOTALS — D(3), E(4), F(5), G(6), H(7), I(8), J(9), K(10), P(15), Q(16)
      const p1g  = tot ? g(tot, 3)  : null;
      const p1n_ = tot ? g(tot, 4)  : null;
      const p2g  = tot ? g(tot, 5)  : null;
      const p2n_ = tot ? g(tot, 6)  : null;
      const p3g  = tot ? g(tot, 7)  : null;
      const p3n_ = tot ? g(tot, 8)  : null;
      const p4g  = tot ? g(tot, 9)  : null;
      const p4n_ = tot ? g(tot, 10) : null;
      const ptsA = tot ? g(tot, 15) : null;
      const ptsB = tot ? g(tot, 16) : null;

      return {
        matchNum: i + 1,
        side: sm.side,
        tt: sm.tt,
        winner,
        hasScores: !!(p1g || p3g),
        teamA: {
          name: teamAName, pts: ptsA,
          players: [
            {name: p1n, hdcp: hdr.hdcpA1, gross: p1g, net: p1n_, sub: isSub(hdr.subA1)},
            {name: p2n, hdcp: hdr.hdcpA2, gross: p2g, net: p2n_, sub: isSub(hdr.subA2)},
          ]
        },
        teamB: {
          name: teamBName, pts: ptsB,
          players: [
            {name: p3n, hdcp: hdr.hdcpB1, gross: p3g, net: p3n_, sub: isSub(hdr.subB1)},
            {name: p4n, hdcp: hdr.hdcpB2, gross: p4g, net: p4n_, sub: isSub(hdr.subB2)},
          ]
        }
      };
    });

    renderWeek(w, matches, weekData);
    const scored = matches.filter(m => m.hasScores).length;
    document.getElementById('statusText').textContent =
      `Week ${w} — ${weekData.date}${weekData.fun ? ' ★ Fun Night' : ''} · ${scored}/${matches.length} matches scored`;

  } catch(e) {
    console.error(e);
    document.getElementById('matchContent').innerHTML =
      `<div style="padding:32px;text-align:center;color:#c0392b;background:#fff;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.1)">Could not load Week ${w}.<br><small style="opacity:.7">${e.message}</small></div>`;
    document.getElementById('statusText').textContent = 'Error loading scores';
  }
}

function renderTeam(team, isWinner) {
  const nameClass = 'team-name-label' + (isWinner ? ' winner' : '');
  const ptsText = team.pts != null ? `${team.pts} pts` : '—';
  const playerRows = team.players.map(p => {
    const has = p.gross != null && p.gross !== 0;
    return `<div class="player-row">
      <div class="player-name-cell">${esc(p.name)}${p.sub ? '<span class="sub-badge">SUB</span>' : ''}</div>
      <div class="score-col ${has?'':'empty'}">${p.hdcp != null ? p.hdcp : '—'}</div>
      <div class="score-col ${has?'':'empty'}">${has ? p.gross : '—'}</div>
      <div class="score-col net ${has?'':'empty'}">${has ? p.net : '—'}</div>
    </div>`;
  }).join('');
  return `<div class="team">
    <div class="team-header">
      <div class="${nameClass}">${esc(team.name)}${isWinner?' 🏆':''}</div>
      <div class="team-pts">${ptsText}</div>
    </div>
    <div class="score-header"><span>Player</span><span>Hdcp</span><span>Gross</span><span>Net</span></div>
    ${playerRows}
  </div>`;
}

function renderMatch(m) {
  let result = '';
  if (m.winner==='a')    result=`<div class="match-result">▲ ${esc(m.teamA.name)} wins</div>`;
  else if(m.winner==='b') result=`<div class="match-result">▼ ${esc(m.teamB.name)} wins</div>`;
  else if(m.winner==='tie') result=`<div class="match-result">TIE</div>`;
  else if(!m.hasScores)  result=`<div class="match-result" style="opacity:.4">Not yet played</div>`;
  return `<div class="match">
    <div class="match-top">
      <div class="match-meta">Match ${m.matchNum} &nbsp;·&nbsp; ${m.side} 9 &nbsp;·&nbsp; Tee Time ${m.tt}</div>
      <div class="match-title">${esc(m.teamA.name)} vs ${esc(m.teamB.name)}</div>
      ${result}
    </div>
    ${renderTeam(m.teamA, m.winner==='a')}
    ${renderTeam(m.teamB, m.winner==='b')}
  </div>`;
}

function renderWeek(w, matches, weekData) {
  const front = matches.filter(m=>m.side==='Front');
  const back  = matches.filter(m=>m.side==='Back');
  let html = '';
  if (front.length) {
    html += `<div class="section-label front"><span>Front 9</span></div>`;
    html += front.map(renderMatch).join('');
  }
  if (back.length) {
    html += `<div class="section-label back"><span>Back 9</span></div>`;
    html += back.map(renderMatch).join('');
  }
  document.getElementById('matchContent').innerHTML = html;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

selectWeek(1);
