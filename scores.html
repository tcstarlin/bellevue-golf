<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Scores · Bellevue Merchants Golf League</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:#1a3a2a; --green2:#2d5a3f; --green3:#3d7a54;
  --gold:#c8a84b; --gold2:#e8c96a; --cream:#f5f0e8;
  --white:#ffffff; --gray:#6b7280; --light:#eef2ed;
  --red:#c0392b; --blue:#1565c0; --radius:8px;
  --shadow:0 2px 12px rgba(0,0,0,.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--green);min-height:100vh;}

/* HEADER */
header{background:var(--green);color:var(--white);padding:40px 24px 32px;text-align:center;position:relative;}
header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(200,168,75,.18) 0%,transparent 70%);pointer-events:none;}
.league-badge{display:inline-block;border:1px solid rgba(200,168,75,.4);color:var(--gold2);font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;padding:4px 14px;border-radius:2px;margin-bottom:14px;}
header h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:900;line-height:1.1;margin-bottom:6px;}
header h1 span{color:var(--gold2);}
.header-meta{color:rgba(255,255,255,.55);font-size:.85rem;}

/* NAV */
nav{background:var(--green2);position:sticky;top:0;z-index:100;border-bottom:2px solid var(--gold);box-shadow:0 2px 8px rgba(0,0,0,.2);}
nav ul{display:flex;list-style:none;max-width:960px;margin:0 auto;overflow-x:auto;}
nav ul::-webkit-scrollbar{display:none;}
nav a{display:block;color:rgba(255,255,255,.75);text-decoration:none;font-size:.82rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:13px 18px;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:color .2s;}
nav a:hover,nav a.active{color:var(--gold2);border-bottom-color:var(--gold2);}

/* MAIN */
main{max-width:960px;margin:0 auto;padding:28px 16px 64px;}

/* WEEK SELECTOR */
.week-selector{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:28px;}
.week-selector-label{font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:var(--green3);margin-bottom:12px;}
.week-buttons{display:flex;flex-wrap:wrap;gap:8px;}
.week-btn{padding:7px 14px;border:2px solid rgba(45,90,63,.2);border-radius:6px;font-family:'DM Mono',monospace;font-size:.8rem;font-weight:600;color:var(--green);background:var(--white);cursor:pointer;transition:all .15s;}
.week-btn:hover{border-color:var(--green3);background:var(--light);}
.week-btn.active{background:var(--green);color:var(--white);border-color:var(--green);}
.week-btn.fun{border-color:var(--gold);}
.week-btn.fun.active{background:var(--gold);color:var(--green);}
.week-btn:disabled{opacity:.4;cursor:not-allowed;}

/* WEEK HEADER */
.week-header{margin-bottom:24px;}
.week-title{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;color:var(--green);}
.week-subtitle{color:var(--gray);font-size:.88rem;margin-top:4px;}
.fun-night-badge{display:inline-block;background:var(--gold);color:var(--green);font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:4px;letter-spacing:.05em;text-transform:uppercase;margin-left:10px;vertical-align:middle;}

/* SECTION DIVIDERS */
.section-divider{display:flex;align-items:center;gap:12px;margin:24px 0 16px;}
.section-divider-line{flex:1;height:1px;background:rgba(45,90,63,.15);}
.section-divider-label{font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--green3);white-space:nowrap;}
.side-front .section-divider-label{color:#2e7d32;}
.side-back .section-divider-label{color:var(--blue);}

/* MATCH CARD */
.match-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden;}
.match-header{padding:12px 16px;background:var(--green);color:var(--white);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.match-info{font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.08em;color:rgba(255,255,255,.6);}
.match-teams{font-weight:700;font-size:.95rem;letter-spacing:.01em;}
.match-winner{font-family:'DM Mono',monospace;font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:4px;white-space:nowrap;}
.winner-a{background:rgba(200,168,75,.25);color:var(--gold2);}
.winner-b{background:rgba(200,168,75,.25);color:var(--gold2);}
.winner-tie{background:rgba(255,255,255,.15);color:rgba(255,255,255,.7);}
.match-body{padding:0;}

/* TEAMS */
.team-section{padding:14px 16px;}
.team-section:first-of-type{border-bottom:1px solid rgba(45,90,63,.08);}
.team-name-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.team-name{font-weight:700;font-size:.95rem;color:var(--green);}
.team-pts{font-family:'DM Mono',monospace;font-size:.82rem;font-weight:600;color:var(--green3);}
.team-pts-label{font-size:.68rem;color:var(--gray);margin-left:4px;}

/* PLAYER ROWS */
.players-table{width:100%;border-collapse:collapse;}
.players-table th{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;color:var(--gray);padding:4px 8px;text-align:center;border-bottom:1px solid rgba(0,0,0,.06);}
.players-table th.name-th{text-align:left;padding-left:0;}
.players-table td{padding:6px 8px;font-family:'DM Mono',monospace;font-size:.82rem;text-align:center;color:var(--green);}
.players-table td.player-name{font-family:'DM Sans',sans-serif;font-weight:600;font-size:.85rem;text-align:left;padding-left:0;}
.players-table td.net-score{color:var(--green3);}
.players-table td.no-score{color:#ccc;}
.sub-tag{font-size:.68rem;color:var(--gold);font-weight:400;font-family:'DM Mono',monospace;margin-left:4px;}

/* LOADING / ERROR */
.loading-state{padding:48px;text-align:center;}
.spinner{width:28px;height:28px;border:3px solid rgba(45,90,63,.15);border-top-color:var(--green3);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{color:var(--gray);font-size:.9rem;}
.error-state{padding:32px;text-align:center;color:var(--red);background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);}
.no-scores{padding:32px;text-align:center;color:var(--gray);background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);font-size:.9rem;}

/* LIVE BADGE */
.live-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(45,90,63,.1);color:var(--green2);font-size:.73rem;font-family:'DM Mono',monospace;padding:4px 10px;border-radius:20px;margin-bottom:20px;}
.live-dot{width:7px;height:7px;background:#22c55e;border-radius:50%;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.8);}}

footer{background:var(--green);color:rgba(255,255,255,.45);text-align:center;font-size:.78rem;padding:20px;font-family:'DM Mono',monospace;letter-spacing:.04em;}

@media(max-width:600px){
  .match-header{flex-direction:column;align-items:flex-start;gap:6px;}
  .players-table td,.players-table th{padding:5px 4px;font-size:.76rem;}
}
</style>
</head>
<body>

<header>
  <div class="league-badge">Est. Bellevue, Nebraska</div>
  <h1>Bellevue Merchants<br><span>Golf League</span></h1>
  <p class="header-meta">2026 Season &nbsp;·&nbsp; Weekly Scores</p>
</header>

<nav>
  <ul>
    <li><a href="/">Home</a></li>
    <li><a href="/#roster">Roster</a></li>
    <li><a href="/#standings">Standings</a></li>
    <li><a href="/scores" class="active">Scores</a></li>
    <li><a href="/players">Player Scores</a></li>
    <li><a href="scores">Scores</a></li>
    <li><a href="/scorecard">📱 Scorecard</a></li>
  </ul>
</nav>

<main>
  <!-- WEEK SELECTOR -->
  <div class="week-selector">
    <div class="week-selector-label">Select Week</div>
    <div class="week-buttons" id="weekButtons"></div>
  </div>

  <!-- LIVE BADGE -->
  <div class="live-badge">
    <span class="live-dot"></span>
    <span id="liveStatus">Select a week to load scores</span>
  </div>

  <!-- CONTENT -->
  <div id="content"></div>
</main>

<footer>
  Bellevue Merchants Golf League &nbsp;·&nbsp; 2026 Season &nbsp;·&nbsp; Bellevue, Nebraska
</footer>

<script>
const SHEET_ID = '1v0qmvIDJyyA-4yJNw8OwqxmaPDSYgbfue5o-6Kqb7xE';

const WEEK_DATES = [
  '4/21','4/28','5/5','5/12','5/19','5/26',
  '6/2','6/9','6/16','6/23','6/30','7/7',
  '7/14','7/21','7/28','8/4','8/11','8/18','8/25','9/1'
];
const FUN_WEEKS = new Set([5,10,15,20]);

let currentWeek = null;

// Build week buttons
function buildWeekButtons() {
  const container = document.getElementById('weekButtons');
  for (let w = 1; w <= 20; w++) {
    const btn = document.createElement('button');
    btn.className = 'week-btn' + (FUN_WEEKS.has(w) ? ' fun' : '');
    btn.textContent = `W${w}`;
    btn.title = WEEK_DATES[w-1] + (FUN_WEEKS.has(w) ? ' ★ Fun Night' : '');
    btn.onclick = () => loadWeek(w);
    btn.id = `week-btn-${w}`;
    container.appendChild(btn);
  }
  
  // Auto-load most recent week with scores
  loadWeek(1);
}

async function fetchWeekSheet(weekNum) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent('Week_' + weekNum)}`;
  const res = await fetch(url);
  const text = await res.text();
  return JSON.parse(text.replace(/^[^(]+\(/, '').replace(/\);?\s*$/, '')).table;
}

function g(row, ci) {
  if (!row || !row.c || !row.c[ci]) return null;
  return row.c[ci].v !== undefined ? row.c[ci].v : null;
}

function parseWeekData(table) {
  if (!table || !table.rows) return [];
  const rows = table.rows;
  const matches = [];

  for (let ri = 0; ri < rows.length; ri++) {
    const row = rows[ri];
    const colA = String(g(row, 0) || '').trim();

    // Match header: "Match N | Front/Back 9 | Tee Time N"
    if (colA.startsWith('Match ') && colA.includes('|')) {
      const parts = colA.split('|').map(s => s.trim());
      const matchNum = parseInt(parts[0].replace('Match','').trim());
      const side = parts[1].includes('Front') ? 'Front' : 'Back';
      const ttMatch = parts[2].match(/\d+/);
      const tt = ttMatch ? parseInt(ttMatch[0]) : matchNum;
      const matchup = String(g(row, 2) || '');
      const winnerRaw = String(g(row, 11) || '');

      // Team A row (ri+1), Team B row (ri+2)
      const rowA = rows[ri + 1];
      const rowB = rows[ri + 2];
      if (!rowA || !rowB) continue;

      const teamAName = String(g(rowA, 1) || '');
      const teamBName = String(g(rowB, 1) || '');

      // Player names (col D=3, H=7) and net hdcp (col G=6, K=10)
      const p1name = String(g(rowA, 3) || '');
      const p1hdcp = g(rowA, 6);
      const p2name = String(g(rowA, 7) || '');
      const p2hdcp = g(rowA, 10);
      const p3name = String(g(rowB, 3) || '');
      const p3hdcp = g(rowB, 6);
      const p4name = String(g(rowB, 7) || '');
      const p4hdcp = g(rowB, 10);

      // Sub overrides (col R=17, T=19)
      const p1sub = g(rowA, 17);
      const p2sub = g(rowA, 19);
      const p3sub = g(rowB, 17);
      const p4sub = g(rowB, 19);

      // Find TOTALS row
      let totals = null;
      for (let ti = ri + 3; ti < Math.min(ri + 16, rows.length); ti++) {
        if (String(g(rows[ti], 0) || '').trim() === 'TOTALS') {
          totals = rows[ti];
          break;
        }
      }

      const pts = totals ? {
        p1gross: g(totals, 3), p1net: g(totals, 4),
        p2gross: g(totals, 5), p2net: g(totals, 6),
        p3gross: g(totals, 7), p3net: g(totals, 8),
        p4gross: g(totals, 9), p4net: g(totals, 10),
        ptsA: g(totals, 15), ptsB: g(totals, 16)
      } : null;

      // Determine winner
      let winner = 'none';
      if (winnerRaw.includes('TEAM A')) winner = 'a';
      else if (winnerRaw.includes('TEAM B')) winner = 'b';
      else if (winnerRaw.toUpperCase().includes('TIE')) winner = 'tie';

      const isSub = (val) => val && !String(val).includes('←') && String(val).trim().length > 0;

      matches.push({
        matchNum, side, tt, matchup,
        teamA: {
          name: teamAName,
          pts: pts ? pts.ptsA : null,
          players: [
            {name: p1name, hdcp: p1hdcp, gross: pts?.p1gross, net: pts?.p1net, isSub: isSub(p1sub)},
            {name: p2name, hdcp: p2hdcp, gross: pts?.p2gross, net: pts?.p2net, isSub: isSub(p2sub)},
          ]
        },
        teamB: {
          name: teamBName,
          pts: pts ? pts.ptsB : null,
          players: [
            {name: p3name, hdcp: p3hdcp, gross: pts?.p3gross, net: pts?.p3net, isSub: isSub(p3sub)},
            {name: p4name, hdcp: p4hdcp, gross: pts?.p4gross, net: pts?.p4net, isSub: isSub(p4sub)},
          ]
        },
        winner,
        hasScores: pts && (pts.p1gross || pts.p3gross)
      });
    }
  }
  return matches;
}

function renderTeam(team, isWinner) {
  const ptsDisplay = team.pts != null ? team.pts : '—';
  const winnerClass = isWinner ? 'color:var(--gold);' : '';

  let rows = team.players.map(p => {
    const hasScore = p.gross != null && p.gross !== 0;
    const nameDisplay = p.name + (p.isSub ? '<span class="sub-tag">SUB</span>' : '');
    return `<tr>
      <td class="player-name">${escHtml(p.name)}${p.isSub ? '<span class="sub-tag">SUB</span>' : ''}</td>
      <td>${p.hdcp != null ? p.hdcp : '—'}</td>
      <td class="${hasScore ? '' : 'no-score'}">${hasScore ? p.gross : '—'}</td>
      <td class="${hasScore ? 'net-score' : 'no-score'}">${hasScore ? p.net : '—'}</td>
    </tr>`;
  }).join('');

  return `<div class="team-section">
    <div class="team-name-row">
      <div class="team-name" style="${winnerClass}">${escHtml(team.name)}${isWinner ? ' 🏆' : ''}</div>
      <div class="team-pts">${ptsDisplay}<span class="team-pts-label">pts</span></div>
    </div>
    <table class="players-table">
      <thead><tr>
        <th class="name-th">Player</th>
        <th>Hdcp</th>
        <th>Gross</th>
        <th>Net</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function renderMatches(matches, weekNum) {
  const isFun = FUN_WEEKS.has(weekNum);
  const date = WEEK_DATES[weekNum - 1];

  let html = `<div class="week-header">
    <div class="week-title">Week ${weekNum} — ${date}${isFun ? '<span class="fun-night-badge">★ Fun Night</span>' : ''}</div>
    <div class="week-subtitle">${matches.length} matches &nbsp;·&nbsp; ${matches.filter(m => m.hasScores).length} with scores</div>
  </div>`;

  // Group by side
  const front = matches.filter(m => m.side === 'Front').sort((a,b) => a.tt - b.tt);
  const back  = matches.filter(m => m.side === 'Back').sort((a,b) => a.tt - b.tt);

  if (front.length) {
    html += `<div class="section-divider side-front"><div class="section-divider-line"></div><div class="section-divider-label">Front 9</div><div class="section-divider-line"></div></div>`;
    html += front.map(m => renderMatch(m)).join('');
  }
  if (back.length) {
    html += `<div class="section-divider side-back"><div class="section-divider-line"></div><div class="section-divider-label">Back 9</div><div class="section-divider-line"></div></div>`;
    html += back.map(m => renderMatch(m)).join('');
  }

  return html;
}

function renderMatch(m) {
  let winnerLabel = '';
  if (m.winner === 'a') winnerLabel = `<span class="match-winner winner-a">▲ ${escHtml(m.teamA.name)} wins</span>`;
  else if (m.winner === 'b') winnerLabel = `<span class="match-winner winner-b">▼ ${escHtml(m.teamB.name)} wins</span>`;
  else if (m.winner === 'tie') winnerLabel = `<span class="match-winner winner-tie">TIE</span>`;

  return `<div class="match-card">
    <div class="match-header">
      <div>
        <div class="match-info">Match ${m.matchNum} &nbsp;·&nbsp; ${m.side} 9 &nbsp;·&nbsp; Tee Time ${m.tt}</div>
        <div class="match-teams">${escHtml(m.teamA.name)} vs ${escHtml(m.teamB.name)}</div>
      </div>
      ${winnerLabel}
    </div>
    <div class="match-body">
      ${renderTeam(m.teamA, m.winner === 'a')}
      ${renderTeam(m.teamB, m.winner === 'b')}
    </div>
  </div>`;
}

async function loadWeek(weekNum) {
  if (currentWeek === weekNum) return;
  currentWeek = weekNum;

  // Update button states
  document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
  const activeBtn = document.getElementById(`week-btn-${weekNum}`);
  if (activeBtn) activeBtn.classList.add('active');

  const content = document.getElementById('content');
  const status = document.getElementById('liveStatus');

  content.innerHTML = `<div class="loading-state"><div class="spinner"></div><div class="loading-text">Loading Week ${weekNum} scores…</div></div>`;
  status.textContent = `Loading Week ${weekNum}…`;

  try {
    const table = await fetchWeekSheet(weekNum);
    const matches = parseWeekData(table);

    if (!matches.length) {
      content.innerHTML = `<div class="no-scores">No match data found for Week ${weekNum}.</div>`;
      status.textContent = `Week ${weekNum} — no data`;
      return;
    }

    content.innerHTML = renderMatches(matches, weekNum);
    const scored = matches.filter(m => m.hasScores).length;
    status.textContent = `Week ${weekNum} · ${WEEK_DATES[weekNum-1]} · ${scored} of ${matches.length} matches scored · loaded ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;

  } catch(err) {
    console.error(err);
    content.innerHTML = `<div class="error-state">Could not load Week ${weekNum}.<br><small>${err.message}</small></div>`;
    status.textContent = 'Error loading scores';
  }
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

buildWeekButtons();
</script>
</body>
</html>
