<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scores · Bellevue Merchants Golf League</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:#1a3a2a; --green2:#2d5a3f; --green3:#3d7a54;
  --gold:#c8a84b; --gold2:#e8c96a;
  --cream:#f5f0e8; --white:#fff; --gray:#6b7280; --light:#eef2ed;
  --radius:8px; --shadow:0 2px 12px rgba(0,0,0,.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--green);min-height:100vh;}
header{background:var(--green);color:#fff;padding:36px 20px 28px;text-align:center;position:relative;overflow:hidden;}
header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(200,168,75,.18) 0%,transparent 70%);pointer-events:none;}
.badge{display:inline-block;border:1px solid rgba(200,168,75,.4);color:var(--gold2);font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;padding:3px 12px;border-radius:2px;margin-bottom:12px;}
header h1{font-family:'Playfair Display',serif;font-size:clamp(1.7rem,5vw,2.8rem);font-weight:900;line-height:1.1;margin-bottom:5px;}
header h1 span{color:var(--gold2);}
.header-sub{color:rgba(255,255,255,.5);font-size:.83rem;}
nav{background:var(--green2);position:sticky;top:0;z-index:100;border-bottom:2px solid var(--gold);box-shadow:0 2px 8px rgba(0,0,0,.2);}
nav ul{display:flex;list-style:none;max-width:960px;margin:0 auto;overflow-x:auto;}
nav ul::-webkit-scrollbar{display:none;}
nav a{display:block;color:rgba(255,255,255,.75);text-decoration:none;font-size:.8rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:13px 16px;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;}
nav a:hover,nav a.active{color:var(--gold2);border-bottom-color:var(--gold2);}
main{max-width:720px;margin:0 auto;padding:24px 16px 60px;}
.week-picker{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 16px;margin-bottom:20px;}
.picker-label{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--green3);margin-bottom:10px;}
.week-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;}
.wk{padding:6px 2px;border:2px solid rgba(45,90,63,.18);border-radius:5px;font-family:'DM Mono',monospace;font-size:.75rem;font-weight:600;color:var(--green);background:var(--white);cursor:pointer;text-align:center;transition:all .15s;}
.wk:hover{border-color:var(--green3);background:var(--light);}
.wk.fun{border-color:var(--gold);color:var(--gold);}
.wk.active{background:var(--green);color:#fff;border-color:var(--green);}
.wk.fun.active{background:var(--gold);color:var(--green);border-color:var(--gold);}
@media(max-width:500px){.week-grid{grid-template-columns:repeat(5,1fr);}}
.status-bar{display:flex;align-items:center;gap:8px;margin-bottom:20px;font-family:'DM Mono',monospace;font-size:.72rem;color:var(--green2);}
.dot{width:7px;height:7px;background:#22c55e;border-radius:50%;animation:pulse 2s ease-in-out infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.75);}}
.loading{text-align:center;padding:48px 20px;}
.spinner{width:28px;height:28px;border:3px solid rgba(45,90,63,.15);border-top-color:var(--green3);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading p{color:var(--gray);font-size:.9rem;}
.section-label{display:flex;align-items:center;gap:10px;margin:20px 0 12px;}
.section-label span{font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;font-weight:600;white-space:nowrap;}
.section-label.front span{color:#2e7d32;}
.section-label.back span{color:#1565c0;}
.section-label::before,.section-label::after{content:'';flex:1;height:1px;background:rgba(45,90,63,.15);}
.match{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;}
.match-top{background:var(--green);padding:10px 14px;}
.match-meta{font-family:'DM Mono',monospace;font-size:.65rem;color:rgba(255,255,255,.5);letter-spacing:.06em;margin-bottom:3px;}
.match-title{font-weight:700;font-size:.92rem;color:#fff;}
.match-result{display:inline-block;margin-top:5px;font-family:'DM Mono',monospace;font-size:.68rem;padding:2px 8px;border-radius:3px;background:rgba(200,168,75,.2);color:var(--gold2);}
.team{padding:12px 14px;}
.team+.team{border-top:1px solid rgba(45,90,63,.08);}
.team-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.team-name{font-weight:700;font-size:.9rem;}
.team-name.winner{color:var(--green3);}
.team-pts{font-family:'DM Mono',monospace;font-size:.8rem;font-weight:600;}
.score-header{display:grid;grid-template-columns:1fr auto auto auto;gap:0 12px;padding:0 0 4px;border-bottom:1px solid rgba(45,90,63,.1);margin-bottom:2px;}
.score-header span{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--gray);text-align:right;}
.score-header span:first-child{text-align:left;}
.player-row{display:grid;grid-template-columns:1fr auto auto auto;gap:0 12px;align-items:center;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.04);}
.player-row:last-child{border-bottom:none;}
.player-name-cell{font-size:.85rem;font-weight:600;}
.sub-badge{font-size:.62rem;font-family:'DM Mono',monospace;color:var(--gold);margin-left:5px;background:rgba(200,168,75,.12);padding:1px 5px;border-radius:3px;}
.score-col{font-family:'DM Mono',monospace;font-size:.82rem;text-align:right;}
.score-col.net{color:var(--green3);}
.score-col.empty{color:#ccc;}
footer{background:var(--green);color:rgba(255,255,255,.4);text-align:center;font-size:.76rem;padding:18px;font-family:'DM Mono',monospace;letter-spacing:.04em;}
</style>
</head>
<body>
<header>
  <div class="badge">Est. Bellevue, Nebraska</div>
  <h1>Bellevue Merchants<br><span>Golf League</span></h1>
  <p class="header-sub">2026 Season &nbsp;·&nbsp; Weekly Scores</p>
</header>
<nav>
  <ul>
    <li><a href="/">Home</a></li>
    <li><a href="/#roster">Roster</a></li>
    <li><a href="/#schedule">Schedule</a></li>
    <li><a href="/#standings">Standings</a></li>
    <li><a href="/scores" class="active">Scores</a></li>
    <li><a href="/scorecard">📱 Scorecard</a></li>
  </ul>
</nav>
<main>
  <div class="week-picker">
    <div class="picker-label">Select Week</div>
    <div class="week-grid" id="weekGrid"></div>
  </div>
  <div class="status-bar">
    <span class="dot"></span>
    <span id="statusText">Select a week above</span>
  </div>
  <div id="matchContent"></div>
</main>
<footer>Bellevue Merchants Golf League &nbsp;·&nbsp; 2026 Season &nbsp;·&nbsp; Bellevue, Nebraska</footer>

<script>
const SHEET_ID = '1v0qmvIDJyyA-4yJNw8OwqxmaPDSYgbfue5o-6Kqb7xE';

// Authoritative roster — player names keyed by team name
const ROSTER = {
  'Kathol/Llewellyn':          ['Justin Kathol',       'James Llewellyn'],
  'Cascio/Cascio':             ['Brennan Cascio',      'Alfie Cascio'],
  'Friedenbach/Pribyl':        ['Lee Friedenbach',     'Scott Pribyl'],
  'Kramer/Oliver':             ['Robert Kramer',       'Kevin Oliver'],
  'Hike/Laughlin':             ['Drew Laughlin',       'JR Hike'],
  'Bassingthwaighte/Landeen':  ['Dax Landeen',         'Eric Bassingthwaighte'],
  'Giff/Kouba':                ['Marty Giff',          'Tony Kouba'],
  'Tankersley/Wertzberger':    ['Michael Wertzberger', 'Travis Tankersley'],
  'Keating/Severa':            ['Justin Keating',      'Matt Severa'],
  'Czerwinski/Haase':          ['Bob Czerwinski',      'Kyle Haase'],
  'Scott/Scott':               ['Eric Scott',          'Kevin Scott'],
  'Hope/Kiviniemi':            ['Greg Hope',           'Don Kiviniemi'],
  'Bartling/Friedenbach':      ['Len Friedenbach',     'Brian Bartling'],
  'Zeleny/Zeleny':             ['John Zeleny',         'JJ Zeleny'],
  'Dowling/Wright':            ['Michael Dowling',     'Jeremy Wright'],
  'Allen/Gassen':              ['Eric Gassen',         'Michael Allen'],
  'Weibel/Wiese':              ['Jeffrey Weibel',      'Timothy Wiese'],
  'Weber/Woodle':              ['Dan Weber',           'Marc Woodle'],
  'Bradley/Jackson':           ['Darrel Jackson',      'Preston Bradley'],
  'Hilt/Oehlerking':           ['Rich Hilt',           'Oehlerking'],
  'Campbell/Chandler':         ['Nick Chandler',       'Jason Campbell'],
  'Dubbs/Marshall Jr':         ['Andy Dubbs',          'Stephen Marshall Jr'],
  'Grad/Towles':               ['Brian Grad',          'Jamie Towles'],
  'STARLIN/Shultz':            ['Todd Starlin',        'Troy Shultz'],
  'Starlin/Shultz':            ['Todd Starlin',        'Troy Shultz'],
  'Hike/Vail':                 ['Jason Hike',          'Terry Vail'],
  'Lirette/Pichler':           ['Josh Lirette',        'Evan Pichler'],
  'Clark/WHEELER':             ['Mike Wheeler',        'Casey Clark'],
  'Clark/Wheeler':             ['Mike Wheeler',        'Casey Clark'],
  'Baldwin/Baldwin':           ['Rick Baldwin',        'Tommy Baldwin'],
};

// Week info
const WEEK_INFO = [
  {w:1,date:'Apr 21',fun:false},{w:2,date:'Apr 28',fun:false},
  {w:3,date:'May 5',fun:false}, {w:4,date:'May 12',fun:false},
  {w:5,date:'May 19',fun:true}, {w:6,date:'May 26',fun:false},
  {w:7,date:'Jun 2',fun:false}, {w:8,date:'Jun 9',fun:false},
  {w:9,date:'Jun 16',fun:false},{w:10,date:'Jun 23',fun:true},
  {w:11,date:'Jun 30',fun:false},{w:12,date:'Jul 7',fun:false},
  {w:13,date:'Jul 14',fun:false},{w:14,date:'Jul 21',fun:false},
  {w:15,date:'Jul 28',fun:true},{w:16,date:'Aug 4',fun:false},
  {w:17,date:'Aug 11',fun:false},{w:18,date:'Aug 18',fun:false},
  {w:19,date:'Aug 25',fun:false},{w:20,date:'Sep 1',fun:true},
];

let activeWeek = null;

// Build week buttons
const grid = document.getElementById('weekGrid');
WEEK_INFO.forEach(({w, fun}) => {
  const btn = document.createElement('button');
  btn.className = 'wk' + (fun ? ' fun' : '');
  btn.textContent = `W${w}`;
  btn.id = `wbtn-${w}`;
  btn.onclick = () => selectWeek(w);
  grid.appendChild(btn);
});

// Get cell value safely — handles sparse GViz rows
function g(row, ci) {
  if (!row || !row.c) return null;
  const cell = row.c[ci];
  if (!cell) return null;
  // Return v if it's explicitly set (even if 0 or false)
  if (cell.v !== undefined && cell.v !== null) return cell.v;
  // Fall back to f (formula string) or formatted value
  return cell.f || null;
}

function isSub(v) {
  return v != null && !String(v).includes('←') && String(v).trim().length > 0;
}

// Look up team players from roster — uses team name to get player names
function getPlayers(teamName) {
  if (!teamName) return ['—', '—'];
  // Try exact match first
  if (ROSTER[teamName]) return ROSTER[teamName];
  // Try case-insensitive
  const key = Object.keys(ROSTER).find(k => k.toLowerCase() === teamName.toLowerCase());
  if (key) return ROSTER[key];
  return [teamName + ' P1', teamName + ' P2'];
}

async function selectWeek(w) {
  if (activeWeek === w) return;
  activeWeek = w;

  document.querySelectorAll('.wk').forEach(b => b.classList.remove('active'));
  document.getElementById(`wbtn-${w}`).classList.add('active');

  const info = WEEK_INFO[w - 1];
  document.getElementById('statusText').textContent = `Loading Week ${w} — ${info.date}…`;
  document.getElementById('matchContent').innerHTML = `<div class="loading"><div class="spinner"></div><p>Loading Week ${w} scores…</p></div>`;

  try {
    // headers=0 ensures ALL rows are returned as data rows, not treated as column headers
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=0&sheet=${encodeURIComponent('Week_' + w)}&cb=${Date.now()}`;
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.replace(/^[^(]+\(/, '').replace(/\);?\s*$/, ''));
    const rows = json.table.rows;

    if (!rows || rows.length === 0) throw new Error('No data returned');

    const matches = [];

    for (let ri = 0; ri < rows.length; ri++) {
      const colA = String(g(rows[ri], 0) || '').trim();

      // Match header row: "Match N  |  Front/Back 9  |  Tee Time N"
      if (!colA.startsWith('Match ') || !colA.includes('|')) continue;

      const parts = colA.split('|').map(s => s.trim());
      const matchNum = parseInt(parts[0].replace(/\D/g, '')) || 0;
      const side = (parts[1] || '').includes('Front') ? 'Front' : 'Back';
      const ttMatch = (parts[2] || '').match(/\d+/);
      const tt = ttMatch ? ttMatch[0] : matchNum;

      // Winner is in column L (index 11)
      const winnerRaw = String(g(rows[ri], 11) || '');
      let winner = '';
      if (winnerRaw.includes('TEAM A')) winner = 'a';
      else if (winnerRaw.includes('TEAM B')) winner = 'b';
      else if (winnerRaw.toUpperCase().includes('TIE')) winner = 'tie';

      // Team A row = ri+1, Team B row = ri+2
      const rowA = rows[ri + 1];
      const rowB = rows[ri + 2];
      if (!rowA || !rowB) continue;

      // Team names from column B (index 1)
      const teamAName = String(g(rowA, 1) || '');
      const teamBName = String(g(rowB, 1) || '');

      // Get player names from ROSTER (reliable) — fallback to GViz col D/H
      const [p1n, p2n] = getPlayers(teamAName);
      const [p3n, p4n] = getPlayers(teamBName);

      // Handicaps from column G (index 6) and K (index 10)
      const p1h = g(rowA, 6);
      const p2h = g(rowA, 10);
      const p3h = g(rowB, 6);
      const p4h = g(rowB, 10);

      // Sub overrides: column R (index 17) and T (index 19)
      const p1sub = g(rowA, 17);
      const p2sub = g(rowA, 19);
      const p3sub = g(rowB, 17);
      const p4sub = g(rowB, 19);

      // Find TOTALS row — search ri+3 through ri+20
      let tot = null;
      for (let ti = ri + 3; ti < Math.min(ri + 20, rows.length); ti++) {
        if (String(g(rows[ti], 0) || '').trim() === 'TOTALS') {
          tot = rows[ti];
          break;
        }
      }

      // TOTALS columns: P1 gross=D(3), net=E(4), P2 gross=F(5), net=G(6)
      //                 P3 gross=H(7), net=I(8), P4 gross=J(9), net=K(10)
      //                 Team A pts=P(15), Team B pts=Q(16)
      const p1g  = tot ? g(tot, 3) : null;
      const p1n_ = tot ? g(tot, 4) : null;
      const p2g  = tot ? g(tot, 5) : null;
      const p2n_ = tot ? g(tot, 6) : null;
      const p3g  = tot ? g(tot, 7) : null;
      const p3n_ = tot ? g(tot, 8) : null;
      const p4g  = tot ? g(tot, 9) : null;
      const p4n_ = tot ? g(tot, 10) : null;
      const ptsA = tot ? g(tot, 15) : null;
      const ptsB = tot ? g(tot, 16) : null;

      const hasScores = !!(p1g || p3g);

      matches.push({
        matchNum, side, tt, winner, hasScores,
        teamA: {
          name: teamAName,
          pts: ptsA,
          players: [
            {name: p1n, hdcp: p1h, gross: p1g, net: p1n_, sub: isSub(p1sub)},
            {name: p2n, hdcp: p2h, gross: p2g, net: p2n_, sub: isSub(p2sub)},
          ]
        },
        teamB: {
          name: teamBName,
          pts: ptsB,
          players: [
            {name: p3n, hdcp: p3h, gross: p3g, net: p3n_, sub: isSub(p3sub)},
            {name: p4n, hdcp: p4h, gross: p4g, net: p4n_, sub: isSub(p4sub)},
          ]
        }
      });
    }

    if (matches.length === 0) throw new Error('No matches found in sheet');

    renderWeek(w, matches, info);
    const scored = matches.filter(m => m.hasScores).length;
    document.getElementById('statusText').textContent =
      `Week ${w} — ${info.date}${info.fun ? ' ★ Fun Night' : ''} · ${scored}/${matches.length} matches scored`;

  } catch(e) {
    console.error(e);
    document.getElementById('matchContent').innerHTML =
      `<div style="padding:32px;text-align:center;color:#c0392b;background:#fff;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.1)">Could not load Week ${w}.<br><small style="opacity:.7">${e.message}</small></div>`;
    document.getElementById('statusText').textContent = 'Error loading scores';
  }
}

function renderTeam(team, isWinner) {
  const nameClass = 'team-name' + (isWinner ? ' winner' : '');
  const trophy = isWinner ? ' 🏆' : '';
  const ptsText = team.pts != null ? `${team.pts} pts` : '—';

  const playerRows = team.players.map(p => {
    const hasScore = p.gross != null && p.gross !== 0;
    return `<div class="player-row">
      <div class="player-name-cell">${esc(p.name)}${p.sub ? '<span class="sub-badge">SUB</span>' : ''}</div>
      <div class="score-col ${hasScore ? '' : 'empty'}">${p.hdcp != null ? p.hdcp : '—'}</div>
      <div class="score-col ${hasScore ? '' : 'empty'}">${hasScore ? p.gross : '—'}</div>
      <div class="score-col net ${hasScore ? '' : 'empty'}">${hasScore ? p.net : '—'}</div>
    </div>`;
  }).join('');

  return `<div class="team">
    <div class="team-header">
      <div class="${nameClass}">${esc(team.name)}${trophy}</div>
      <div class="team-pts">${ptsText}</div>
    </div>
    <div class="score-header">
      <span>Player</span><span>Hdcp</span><span>Gross</span><span>Net</span>
    </div>
    ${playerRows}
  </div>`;
}

function renderMatch(m) {
  let resultHTML = '';
  if (m.winner === 'a')    resultHTML = `<div class="match-result">▲ ${esc(m.teamA.name)} wins</div>`;
  else if (m.winner === 'b') resultHTML = `<div class="match-result">▼ ${esc(m.teamB.name)} wins</div>`;
  else if (m.winner === 'tie') resultHTML = `<div class="match-result">TIE</div>`;
  else if (!m.hasScores)   resultHTML = `<div class="match-result" style="opacity:.45">Not yet played</div>`;

  return `<div class="match">
    <div class="match-top">
      <div class="match-meta">Match ${m.matchNum} &nbsp;·&nbsp; ${m.side} 9 &nbsp;·&nbsp; Tee Time ${m.tt}</div>
      <div class="match-title">${esc(m.teamA.name)} vs ${esc(m.teamB.name)}</div>
      ${resultHTML}
    </div>
    ${renderTeam(m.teamA, m.winner === 'a')}
    ${renderTeam(m.teamB, m.winner === 'b')}
  </div>`;
}

function renderWeek(w, matches, info) {
  const front = matches.filter(m => m.side === 'Front').sort((a,b) => a.matchNum - b.matchNum);
  const back  = matches.filter(m => m.side === 'Back').sort((a,b) => a.matchNum - b.matchNum);
  let html = '';
  if (front.length) {
    html += `<div class="section-label front"><span>Front 9</span></div>`;
    html += front.map(renderMatch).join('');
  }
  if (back.length) {
    html += `<div class="section-label back"><span>Back 9</span></div>`;
    html += back.map(renderMatch).join('');
  }
  document.getElementById('matchContent').innerHTML = html;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Auto-load Week 1
selectWeek(1);
</script>
</body>
</html>
